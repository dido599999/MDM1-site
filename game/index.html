<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MDM1 · Rites of the Duat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Cinzel', serif; }
    body { background: #070303; }
    .flame-animate { animation: flicker 0.3s infinite alternate; }
    @keyframes flicker {
      0%   { opacity: 0.8; text-shadow: 0 0 4px #d97706, 0 0 12px #b45309; }
      100% { opacity: 1;   text-shadow: 0 0 16px #f59e0b, 0 0 24px #d97706; }
    }
    .shake { animation: shake 0.2s ease-in-out 0s 2; }
    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-4px); }
      75%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .cobweb-overlay { position: relative; overflow: hidden; }
    .cobweb-overlay::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, rgba(146, 64, 14, 0.15) 0px, rgba(146, 64, 14, 0.15) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 10;
    }
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    #root { min-height: 100vh; }
  </style>
</head>
<body class="text-gray-100 bg-[#070303] selection:bg-amber-800 selection:text-black">
  <div id="root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#000">
      <p style="color:#d97706;font-size:1.25rem;letter-spacing:0.2em" class="flame-animate">Awakening...</p>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script type="text/babel">
    // -------------------- I18N الترجمة واللغة --------------------
    const detectLang = () =>
      (navigator.language || "en").toLowerCase().startsWith("ar") ? "ar" : "en";
    const currentLang = detectLang();
    const T = {
      en: {
        dir: "ltr", title: "RITES OF THE DUAT", subtitle: "Three trials. One eternal imprint.",
        displayName: "Scribe Name",
        choosePatron: "CHOOSE YOUR ANCIENT FORCE",
        credits: "CREDITS", imprints: "IMPRINTS", torch: "RA'S TORCH", days: "days",
        factionTitle: "SCROLL OF DESTINY", stabilityFee: "STABILITY FEE",
        safeMode: "SAFE MODE", highRisk: "HIGH RISK", beginTrials: "BEGIN THE TRIALS",
        hint: "WHISPER OF THE TEMPLE",
        submitQuestion: "SUBMIT TO SCRIBES", backHub: "HUB",
        leaderboardTitle: "ETERNAL SCRIBES", you: "you",
        consecrate: "CONSECRATE", curse: "OVERWRITE (60)",
        perished: "The high priests assumed you perished...",
        loading: "Awakening...", timeFuse: "FUSE OF FATE",
        rateLimit: "Max 3 questions per day reached!",
        sealedOfRa: "Seal of the Council approved!", rejected: "Rejected by the Council.",
        back: "Back", submit: "Submit",
        disclaimer: "This game draws from Ancient Egyptian heritage as historical legacy. Truth belongs to the One."
      },
      ar: {
        dir: "rtl", title: "طقوس العالم السفلي", subtitle: "ثلاث محن. بصمة أبدية.",
        displayName: "اسم الكاتب",
        choosePatron: "اختر قوتك القديمة",
        credits: "ائتمانات", imprints: "بصمات", torch: "شُعلة رع", days: "أيام",
        factionTitle: "لفافة المصير", stabilityFee: "رسوم الاستقرار",
        safeMode: "نمط الأمان", highRisk: "خطر عالٍ", beginTrials: "ابدأ المحن",
        hint: "همسة المعبد",
        submitQuestion: "قدّم للكتبة", backHub: "القاعة الرئيسية",
        leaderboardTitle: "الكتبة الأبديون", you: "أنت",
        consecrate: "كرّس", curse: "استبدال (60)",
        perished: "ظن الكهنة أنك هلكت...",
        loading: "...الاستيقاظ", timeFuse: "فتيل المصير",
        rateLimit: "تم بلوغ الحد الأقصى (3 أسئلة يومياً)!",
        sealedOfRa: "ختم المجلس!", rejected: "رفضه المجلس.",
        back: "رجوع", submit: "إرسال",
        disclaimer: "هذه اللعبة تستلهم رموز الحضارة المصرية القديمة كتراث تاريخي. الحقيقة لله وحده."
      }
    };
    const t = T[currentLang];
    document.documentElement.dir = t.dir;

    // -------------------- SEED QUESTIONS الأسئلة --------------------
    const FULL_SEED = [
      { id:"seed1",  text_en:"Which ancient Egyptian symbol represents life?", text_ar:"أي رمز مصري قديم يمثل الحياة؟", options_en:["Ankh","Scarab","Eye of Horus","Pyramid"], options_ar:["عنخ","جعران","عين حورس","هرم"], correct:0, category:"egyptian", hint_en:"Cross with loop", hint_ar:"صليب بيد", is_active:true, submitted_by:"system" },
      { id:"seed2",  text_en:"What is the underworld realm in Egyptian mythology called?", text_ar:"ما اسم العالم السفلي في الأساطير المصرية؟", options_en:["Aaru","Duat","Amenti","Khepri"], options_ar:["آرو","دوات","أمنتي","خبري"], correct:1, category:"egyptian", hint_en:"Where the sun travels at night", hint_ar:"حيث يسافر الشمس ليلاً", is_active:true, submitted_by:"system" },
      { id:"seed3",  text_en:"Which pharaoh's tomb was found intact in 1922?", text_ar:"مقبرة أي فرعون وُجدت سليمة 1922؟", options_en:["Ramses II","Tutankhamun","Akhenaten","Khufu"], options_ar:["رمسيس الثاني","توت عنخ آمون","إخناتون","خوفو"], correct:1, category:"egyptian", hint_en:"Boy king", hint_ar:"الملك الطفل", is_active:true, submitted_by:"system" },
      { id:"seed4",  text_en:"What does the Eye of Horus represent?", text_ar:"ماذا تمثل عين حورس؟", options_en:["War","Protection & health","Famine","Astronomy"], options_ar:["حرب","حماية وصحة","مجاعة","فلك"], correct:1, category:"egyptian", hint_en:"Amulet", hint_ar:"تميمة", is_active:true, submitted_by:"system" },
      { id:"seed5",  text_en:"Which beetle symbolized rebirth in ancient Egypt?", text_ar:"أي خنفساء كانت ترمز للبعث في مصر القديمة؟", options_en:["Stag","Dung (Scarab)","Goliath","Click"], options_ar:["الأيل","الجعران","جولياث","نقر"], correct:1, category:"egyptian", hint_en:"Rolls the sun", hint_ar:"يدحرج الشمس", is_active:true, submitted_by:"system" },
      { id:"seed6",  text_en:"Which ancient wonder was located at Alexandria?", text_ar:"أي عجائب الدنيا السبع كانت في الإسكندرية؟", options_en:["Pyramids","Lighthouse","Hanging Gardens","Colossus"], options_ar:["الأهرامات","المنارة","الحدائق المعلقة","التمثال"], correct:1, category:"egyptian", hint_en:"Guided ships", hint_ar:"وجه السفن", is_active:true, submitted_by:"system" }
    ];

    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    const FlameIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className={className}>
        <path d="M12 2c-2 4-4 6-4 9a4 4 0 0 0 8 0c0-3-2-5-4-9z" />
        <path d="M12 22c-3 0-5-2-5-4 0-2 2-3 5-3s5 1 5 3-2 4-5 4z" />
      </svg>
    );

    // -------------------- ONBOARDING شاشة اختيار القوة عند البدء لأول مرة --------------------
    const OnboardingScreen = ({ onSelectForce }) => {
      const [name, setName] = useState("");
      const forces = [
        { id:"ra",     name:"Solar Radiance",   ability_en:"+3 seconds to timer",                  ability_ar:"+3 ثوانٍ للمؤقت",            icon:"☀️", bgImg:"https://images.unsplash.com/photo-1600577916048-804c9191e36c?q=80&w=600", desc_en:"Blessing of the Sun",  desc_ar:"بركة الشمس" },
        { id:"anubis", name:"Scales of Truth",  ability_en:"Hide 2 wrong options once per round",  ability_ar:"إخفاء خيارين خاطئين",        icon:"⚰️", bgImg:"https://images.unsplash.com/photo-1600577916048-804c9191e36c?q=80&w=600", desc_en:"Weigher of Hearts",    desc_ar:"ميزان القلوب" },
        { id:"isis",   name:"Shield of Wisdom", ability_en:"Revival shield for first wrong answer", ability_ar:"درع إحياء",                  icon:"🪶", bgImg:"https://images.unsplash.com/photo-1600577916048-804c9191e36c?q=80&w=600", desc_en:"Protector",            desc_ar:"الحامية" },
        { id:"horus",  name:"Eye of Vigilance", ability_en:"Double credits on final correct",      ability_ar:"ضعف النقاط في السؤال الأخير", icon:"🦅", bgImg:"https://images.unsplash.com/photo-1600577916048-804c9191e36c?q=80&w=600", desc_en:"Watchful",             desc_ar:"الساهر" }
      ];

      const handleSelect = (id) => {
        const finalName = name.trim() || (currentLang === 'ar' ? 'كاتب مجهول' : 'Unknown Scribe');
        onSelectForce(id, finalName);
      };

      return (
        <div className="min-h-screen py-12 px-4 bg-gradient-to-b from-neutral-950 via-stone-900 to-black flex flex-col justify-center items-center fade-in">
          <div className="max-w-md w-full mb-8 text-center bg-stone-900/60 p-6 rounded-xl border border-amber-700/40">
            <h2 className="text-amber-400 font-bold mb-2 tracking-widest">{t.displayName}</h2>
            <input 
              type="text" 
              className="w-full p-3 bg-black border border-amber-800 rounded text-center text-amber-100 focus:outline-none focus:border-amber-400 font-bold tracking-wider"
              placeholder="𓁹 𓃠 𓅓"
              value={name}
              onChange={e => setName(e.target.value)}
            />
          </div>

          <h2 className="text-center text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-b from-amber-200 to-amber-500 tracking-wider mb-2">{t.choosePatron}</h2>
          <div className="w-16 h-0.5 bg-amber-600 mb-12" />
          
          <div className="flex flex-wrap justify-center gap-6 max-w-5xl">
            {forces.map(f => (
              <div key={f.id} onClick={() => handleSelect(f.id)}
                   className="group cursor-pointer w-60 h-80 rounded-xl overflow-hidden relative border border-amber-700/50 hover:border-amber-400 bg-black shadow-xl transition-all duration-500 hover:-translate-y-2 flex flex-col justify-end p-4">
                <div className="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110 opacity-30"
                     style={{ backgroundImage:`url('${f.bgImg}')` }} />
                <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent" />
                <div className="relative z-10 text-center">
                  <div className="text-4xl mb-2 filter drop-shadow-[0_0_8px_rgba(212,175,55,0.6)]">{f.icon}</div>
                  <div className="text-xl font-bold text-amber-200">{f.name}</div>
                  <div className="text-[10px] uppercase tracking-widest text-amber-500 mt-0.5">{currentLang==='en' ? f.desc_en : f.desc_ar}</div>
                  <div className="text-xs text-stone-300 mt-3 bg-black/80 backdrop-blur-sm p-2 rounded border border-amber-900/60 font-medium">
                    {currentLang==='en' ? f.ability_en : f.ability_ar}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // -------------------- HUB SCREEN القاعة الرئيسية --------------------
    const HubScreen = ({ profile, credits, streak, imprints, factionWar, leaderboard, onStartRound, onViewSubmit, onViewScroll, simulateAbsence, setSimulateAbsence, onReset }) => {
      const flameActive = !simulateAbsence;
      const total = factionWar.ra + factionWar.anubis + 1;
      const raPct = (factionWar.ra / total) * 100;

      return (
        <div className={`min-h-screen p-4 md:p-8 relative ${simulateAbsence ? 'cobweb-overlay' : ''} bg-[#0b0606] fade-in`}>
          <div className="max-w-6xl mx-auto relative z-10">
            
            {/* الهيدر العلوي */}
            <div className="flex flex-wrap gap-3 justify-between items-center border-b border-amber-800/40 pb-4">
              <div className="text-xl md:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 flex items-center gap-2">
                <span className="text-amber-600">𓃀</span> {profile.display_name} 
                <span className="text-xs bg-amber-950 text-amber-400 px-2 py-0.5 rounded border border-amber-800/40 uppercase tracking-widest">{profile.force}</span>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={() => setSimulateAbsence(!simulateAbsence)}
                        className="text-[10px] tracking-wider uppercase border border-stone-800 hover:border-amber-600 text-stone-400 hover:text-amber-400 px-3 py-1.5 rounded bg-black/40 transition-all">
                  🐪 {simulateAbsence ? "Awake" : "Simulate 7d absence"}
                </button>
                <button onClick={onReset} className="text-stone-500 hover:text-red-400 transition-colors text-xs border border-stone-800 px-2 py-1 rounded">🔄 Reset</button>
              </div>
            </div>

            {/* الإحصائيات وبطاقات التحكم */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
              
              {/* شعلة رع والمؤشرات */}
              <div className="bg-gradient-to-b from-stone-900/80 to-black/90 p-5 rounded-xl border border-amber-900/40 shadow-xl backdrop-blur-sm">
                <div className="flex justify-between items-center border-b border-stone-800 pb-3">
                  <div className="flex items-center gap-2">
                    <FlameIcon className={flameActive ? 'flame-animate text-amber-500' : 'text-stone-700'} />
                    <span className="text-sm font-bold tracking-wider">{t.torch}</span>
                  </div>
                  <strong className="text-amber-400 text-lg">{streak} {t.days}</strong>
                </div>
                {(!flameActive) && (
                  <p className="text-red-400/90 text-xs mt-2 bg-red-950/30 p-2 rounded border border-red-900/40 italic">{t.perished}</p>
                )}
                <div className="mt-4 flex justify-between items-center text-sm">
                  <span className="text-stone-400">{t.credits}:</span>
                  <span className="font-bold text-yellow-500 text-base">✨ {credits}</span>
                </div>
                <div className="mt-1 flex justify-between items-center text-sm">
                  <span className="text-stone-400">{t.imprints}:</span>
                  <span className="font-bold text-amber-400 text-base">𓋹 {imprints.length}</span>
                </div>
              </div>

              {/* لفافة المصير وحرب الفصائل */}
              <div className="bg-gradient-to-b from-stone-900/80 to-black/90 p-5 rounded-xl border border-amber-900/40 shadow-xl backdrop-blur-sm">
                <div className="text-sm font-bold tracking-wider text-amber-200 border-b border-stone-800 pb-3 uppercase">{t.factionTitle}</div>
                <div className="w-full bg-stone-950 h-3 border border-amber-900/30 rounded-full mt-4 overflow-hidden">
                  <div className="bg-gradient-to-r from-amber-600 to-yellow-500 h-full" style={{ width:`${raPct}%` }} />
                </div>
                <div className="flex justify-between text-[10px] tracking-wider font-bold mt-2 text-stone-400">
                  <span>Solar Radiance</span><span>Scales of Truth</span>
                </div>
                <div className="mt-4 pt-2 border-t border-stone-800/60 flex justify-between text-xs text-stone-400">
                  <span>{t.stabilityFee}: <span className="text-amber-500 font-bold">{factionWar.stabilityFee}%</span></span>
                  <span className="uppercase tracking-widest font-bold text-amber-400 bg-amber-950/40 px-2 py-0.5 rounded border border-amber-800/30">
                    {factionWar.mode === 'safe' ? t.safeMode : t.highRisk}
                  </span>
                </div>
              </div>

              {/* زر بدء اللعب والتحكم الآخر */}
              <div className="bg-gradient-to-b from-stone-900/40 to-black/80 p-5 rounded-xl border border-amber-800/30 flex flex-col justify-center gap-3">
                <button onClick={onStartRound}
                        className="w-full bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 py-3 rounded-xl font-black text-black tracking-widest text-lg shadow-lg shadow-amber-950/50 transition-all duration-300">
                  {t.beginTrials}
                </button>
                <div className="grid grid-cols-2 gap-2 mt-1">
                  <button onClick={onViewSubmit}
                          className="border border-amber-800/40 hover:border-amber-500 text-amber-400/90 hover:text-amber-200 py-2 rounded text-xs tracking-wider transition-colors bg-black/30 font-medium">
                    {t.submitQuestion}
                  </button>
                  <button onClick={onViewScroll}
                          className="border border-amber-800/40 hover:border-amber-500 text-amber-400/90 hover:text-amber-200 py-2 rounded text-xs tracking-wider transition-colors bg-black/30 font-medium">
                    {t.leaderboardTitle}
                  </button>
                </div>
              </div>
            </div>

            {/* المتصدرين الأبديين */}
            <div className="mt-8 bg-black/40 border border-stone-900 rounded-xl p-5 shadow-2xl">
              <h3 className="text-amber-400 font-bold tracking-wider border-b border-stone-800 pb-2 mb-4 uppercase flex items-center gap-2">
                <span>🏆</span> {t.leaderboardTitle}
              </h3>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2">
                {leaderboard.map((p, i) => (
                  <div key={i}
                       className={`flex justify-between items-center border-b border-stone-950 py-2 text-sm ${p.display_name===profile.display_name ? 'bg-amber-950/20 px-2 rounded border border-amber-900/30 text-amber-300 font-bold' : ''}`}>
                    <span className="flex items-center gap-2 text-stone-300">
                      <span className="text-xs text-stone-600 font-mono w-4">{i+1}.</span> {p.display_name}
                      {p.display_name===profile.display_name && (
                        <span className="text-[10px] tracking-widest uppercase bg-amber-600 text-black px-1 rounded font-black">{t.you}</span>
                      )}
                    </span>
                    <span className="font-mono font-bold text-amber-400">{p.total_score}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="mt-12 text-center text-[11px] text-stone-600 border-t border-stone-900 pt-6 leading-relaxed font-medium tracking-wide max-w-2xl mx-auto">
              {t.disclaimer}
            </div>
          </div>
        </div>
      );
    };

    // -------------------- PLAY SCREEN شاشة الأسئلة والمحاكمة --------------------
    const PlayScreen = ({ round, roundIndex, setRoundIndex, selectedForce, credits, setCredits, profile, updateProfile, onFinish, consecrate, triggerOverwrite, stabilityFeePercent }) => {
      const q = round[roundIndex];
      const startTime = selectedForce === 'ra' ? 18 : 15;
      const [timeLeft, setTimeLeft] = useState(startTime);
      const [answered, setAnswered] = useState(false);
      const [shake, setShake]       = useState(false);
      const [usedAnubis, setUsedAnubis] = useState(false);
      const [hiddenWrong, setHiddenWrong] = useState(false);
      const [qOwner, setQOwner]     = useState(null);
      const timerRef = useRef(null);

      useEffect(() => {
        setTimeLeft(startTime);
        setAnswered(false);
        setHiddenWrong(false);
        setQOwner(q?.submitted_by !== "system" ? q?.submitted_by : null);
        setShake(false);
      }, [roundIndex, q]);

      useEffect(() => {
        if (answered) return;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              return 0;
            }
            if (prev <= 5) setShake(true);
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [answered, roundIndex]);

      useEffect(() => {
        if (timeLeft === 0 && !answered) handleAnswer(-1);
      }, [timeLeft]);

      const handleAnswer = useCallback((chosenIdx) => {
        if (answered) return;
        setAnswered(true);
        clearInterval(timerRef.current);
        setShake(false);

        const isRight = chosenIdx === q.correct;
        let reward = isRight ? 10 : -5;
        let speedBonus = isRight && timeLeft >= 12 ? 20 : 0;
        let totalDelta = reward + speedBonus;
        if (stabilityFeePercent > 5 && isRight) totalDelta = Math.floor(totalDelta * 1.2);
        
        let newCredits = credits + totalDelta;
        if (newCredits < 0) newCredits = 0;
        
        const newScore = (profile.total_score || 0) + (isRight ? 10 : 0);
        updateProfile({ credits: newCredits, total_score: newScore });
        setCredits(newCredits);

        setTimeout(() => {
          if (isRight) {
            if (qOwner) {
              if (qOwner !== profile.display_name && newCredits >= 60) {
                if (window.confirm(`${t.curse} occupied by ${qOwner}?`)) triggerOverwrite(q.id, qOwner);
              }
            } else {
              const cost = stabilityFeePercent > 5 ? 40 : 30;
              if (newCredits >= cost && window.confirm(`${t.consecrate} (${cost} credits)?`)) consecrate(q.id, cost);
            }
          }
          if (roundIndex + 1 < round.length) setRoundIndex(prev => prev + 1);
          else onFinish();
        }, 1200);
      }, [answered, q, credits, timeLeft, qOwner, roundIndex, round.length]);

      const isHintLie = useMemo(() => Math.random() < 0.2, [q?.id]);
      const hintText  = q ? (q[`hint_${currentLang}`] || q.hint_en) : "";
      const displayHint = isHintLie ? (currentLang==='en' ? "Deception: maybe false" : "خداع: ربما كاذب") : hintText;
      const forceIcons  = { ra:"☀️ Solar Radiance", anubis:"⚰️ Scales of Truth", isis:"🪶 Shield of Wisdom", horus:"🦅 Eye of Vigilance" };

      if (!q) return null;
      const options = currentLang === 'en' ? q.options_en : q.options_ar;

      return (
        <div className={`min-h-screen p-4 flex items-center justify-center bg-[#070303] relative ${shake ? 'shake' : ''}`}>
          <div className="max-w-2xl w-full bg-stone-900/90 backdrop-blur-md p-6 md:p-8 rounded-2xl border border-amber-800/40 shadow-2xl relative z-10 fade-in">
            <div className="flex justify-between items-center text-[10px] tracking-widest font-bold text-stone-400 uppercase mb-2">
              <span className="text-amber-500">🛡️ {forceIcons[selectedForce] || "Ancient Force"}</span>
              {qOwner && <span className="text-red-400 bg-red-950/40 px-2 py-0.5 rounded border border-red-900/30">📜 Owner: {qOwner}</span>}
            </div>
            <div className="flex justify-between items-center text-xs tracking-widest font-bold text-stone-400 uppercase">
              <span>🔥 {t.timeFuse}</span>
              <span className={timeLeft <= 4 ? 'text-red-500 flame-animate' : ''}>{timeLeft}s</span>
            </div>
            <div className="w-full h-2 bg-stone-950 border border-stone-900 rounded-full mt-2 overflow-hidden shadow-inner">
              <div className="h-full bg-gradient-to-r from-amber-600 to-yellow-400 transition-all duration-1000 rounded-full"
                   style={{ width:`${(timeLeft/startTime)*100}%` }} />
            </div>
            <div className="text-xl md:text-2xl my-8 font-bold leading-relaxed text-amber-100 border-l-2 md:border-l-4 border-amber-500 pl-4">
              {currentLang==='en' ? q.text_en : q.text_ar}
            </div>
            <div className="grid grid-cols-1 gap-3 mt-6">
              {options
                .map((opt, idx) => ({opt, idx}))
                .filter(({idx}) => !(selectedForce==='anubis' && hiddenWrong && idx !== q.correct && idx % 2 === 0))
                .map(({opt, idx}) => (
                  <button key={idx} onClick={() => handleAnswer(idx)} disabled={answered}
                          className="bg-black/40 border border-stone-800 text-stone-300 p-3.5 rounded-xl hover:bg-amber-950/40 hover:border-amber-600 disabled:opacity-60 text-left text-sm font-medium tracking-wide transition-all duration-200">
                    {opt}
                  </button>
                ))
              }
            </div>
            {selectedForce==='anubis' && !usedAnubis && !hiddenWrong && (
              <button onClick={() => { setHiddenWrong(true); setUsedAnubis(true); }}
                      className="mt-4 text-xs tracking-wider uppercase font-bold text-amber-400 bg-amber-950/60 border border-amber-800 px-3 py-2 rounded-xl transition-colors">
                🔮 Hide wrong options (Scales of Truth)
              </button>
            )}
            <div className="mt-6 p-3 bg-black/60 rounded-xl italic border-l-4 border-amber-600 text-xs md:text-sm tracking-wide text-stone-400">
              <span className="text-amber-500 not-italic font-black uppercase mr-1">𓋹 {t.hint}:</span> {displayHint}
            </div>
          </div>
        </div>
      );
    };

    // -------------------- SUBMIT SCREEN تقديم سؤال --------------------
    const SubmitScreen = ({ onSubmit, onBack }) => {
      const [newQ, setNewQ] = useState({ text_en:"", text_ar:"", opt1_en:"", opt2_en:"", opt3_en:"", opt4_en:"", opt1_ar:"", opt2_ar:"", opt3_ar:"", opt4_ar:"", correct:0, hint_en:"", hint_ar:"" });
      const handleSend = () => {
        if(!newQ.text_en || !newQ.text_ar) { alert("Please complete the fields"); return; }
        onSubmit({
          id:`user_${Date.now()}`, text_en:newQ.text_en, text_ar:newQ.text_ar,
          options_en:[newQ.opt1_en || "A", newQ.opt2_en || "B", newQ.opt3_en || "C", newQ.opt4_en || "D"],
          options_ar:[newQ.opt1_ar || "أ", newQ.opt2_ar || "ب", newQ.opt3_ar || "ج", newQ.opt4_ar || "د"],
          correct:parseInt(newQ.correct)||0, hint_en:newQ.hint_en || "Hint", hint_ar:newQ.hint_ar || "تلميح", category:"user", is_active:true
        });
      };
      return (
        <div className="min-h-screen p-4 flex items-center justify-center bg-[#070303]">
          <div className="max-w-2xl w-full bg-stone-900/90 backdrop-blur-md p-6 rounded-xl border border-amber-700/60 shadow-2xl relative z-10 fade-in">
            <h2 className="text-2xl font-bold text-amber-400 tracking-wider mb-4 border-b border-stone-800 pb-2">{t.submitQuestion}</h2>
            <textarea placeholder="English question"
                      className="w-full p-2.5 bg-black text-stone-200 rounded border border-stone-800 focus:outline-none focus:border-amber-600 text-sm my-2"
                      onChange={e => setNewQ({...newQ, text_en:e.target.value})} />
            <textarea placeholder="السؤال بالعربية"
                      className="w-full p-2.5 bg-black text-stone-200 rounded border border-stone-800 focus:outline-none focus:border-amber-600 text-sm my-2"
                      onChange={e => setNewQ({...newQ, text_ar:e.target.value})} />
            <div className="grid grid-cols-2 gap-2 mt-2">
              {[1,2,3,4].map(n => (
                <input key={`en${n}`} placeholder={`EN option ${n}`}
                       className="p-2 bg-black text-stone-200 rounded border border-stone-800 text-xs"
                       onChange={e => setNewQ({...newQ, [`opt${n}_en`]:e.target.value})} />
              ))}
              {[1,2,3,4].map(n => (
                <input key={`ar${n}`} placeholder={`خيار ${n}`}
                       className="p-2 bg-black text-stone-200 rounded border border-stone-800 text-xs"
                       onChange={e => setNewQ({...newQ, [`opt${n}_ar`]:e.target.value})} />
              ))}
            </div>
            <div className="mt-3 flex items-center gap-2 text-xs text-stone-400">
              <span>Correct option index (0-3):</span>
              <input type="number" min="0" max="3" defaultValue="0"
                     className="w-16 p-1 bg-black text-stone-200 rounded border border-stone-800 text-center"
                     onChange={e => setNewQ({...newQ, correct:e.target.value})} />
            </div>
            <div className="flex gap-2 mt-4">
              <button onClick={handleSend}
                      className="bg-gradient-to-r from-amber-600 to-amber-500 text-black font-bold tracking-widest px-6 py-2 rounded-xl text-xs">
                {t.submit}
              </button>
              <button onClick={onBack}
                      className="border border-stone-800 text-stone-400 px-4 py-2 rounded-xl text-xs">
                {t.backHub}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // -------------------- SCROLL SCREEN قائمة المتصدرين الكاملة --------------------
    const ScrollScreen = ({ leaderboard, onBack }) => (
      <div className="min-h-screen p-4 flex items-center justify-center bg-[#070303]">
        <div className="bg-stone-900/90 max-w-xl w-full p-6 rounded-xl border border-amber-700/60 shadow-2xl relative z-10 fade-in">
          <h2 className="text-2xl font-bold text-amber-400 tracking-wider border-b border-stone-800 pb-2 mb-4 uppercase">{t.leaderboardTitle}</h2>
          <ul className="divide-y divide-stone-800">
            {leaderboard.map((p, idx) => (
              <li key={idx} className="py-2.5 flex justify-between items-center text-sm text-stone-300">
                <span><span className="text-stone-600 mr-2">{idx+1}.</span> {p.display_name}</span>
                <span className="font-mono font-bold text-amber-500">{p.total_score}</span>
              </li>
            ))}
          </ul>
          <button onClick={onBack}
                  className="mt-6 border border-stone-800 text-stone-400 hover:text-amber-400 px-5 py-2 rounded-xl text-xs uppercase font-bold transition-all bg-black/20">
            {t.backHub}
          </button>
        </div>
      </div>
    );

    // -------------------- MAIN APP المتحكم الأساسي الخالي من السيرفر --------------------
    const App = () => {
      const [profile,       setProfile]       = useState(null);
      const [loading,       setLoading]       = useState(true);
      const [view,          setView]          = useState('onboarding');
      const [questionsDB,   setQuestionsDB]   = useState(FULL_SEED);
      const [currentRound,  setCurrentRound]  = useState([]);
      const [roundIndex,    setRoundIndex]    = useState(0);
      const [credits,       setCredits]       = useState(100);
      const [imprints,      setImprints]      = useState([]);
      const [streak,        setStreak]        = useState(3);
      const [simulateAbsence, setSimulateAbsence] = useState(false);

      const factionWar = { ra: 145, anubis: 120, mode: 'safe', stabilityFee: 3 };
      
      const leaderboard = [
        { display_name: "High Priest Amenhotep", total_score: 280 },
        { display_name: "Scribe Nefertari", total_score: 210 },
        { display_name: profile?.display_name || "You", total_score: profile?.total_score || 0 },
        { display_name: "Thoth_Follower", total_score: 150 },
        { display_name: "Cleopatra_X", total_score: 90 }
      ].sort((a,b) => b.total_score - a.total_score);

      useEffect(() => {
        // تحميل البيانات محلياً من المتصفح لعدم الحاجة لـ Supabase
        const saved = localStorage.getItem("duat_profile");
        if (saved) {
          const parsed = JSON.parse(saved);
          setProfile(parsed);
          setCredits(parsed.credits);
          setImprints(parsed.imprints || []);
          setView('hub');
        }
        setLoading(false);
      }, []);

      const handleSelectForce = (forceId, scribeName) => {
        const p = { display_name: scribeName, force: forceId, total_score: 0, credits: 100, imprints: [] };
        setProfile(p);
        setCredits(100);
        setImprints([]);
        localStorage.setItem("duat_profile", JSON.stringify(p));
        setView('hub');
      };

      const startNewRound = () => {
        const shuffled = [...questionsDB].sort(() => 0.5 - Math.random());
        setCurrentRound(shuffled.slice(0, 3));
        setRoundIndex(0);
        setView('play');
      };

      const updateProfile = (changes) => {
        const updated = { ...profile, ...changes };
        setProfile(updated);
        localStorage.setItem("duat_profile", JSON.stringify(updated));
      };

      const consecrate = (questionId, cost) => {
        const nextCredits = credits - cost;
        const nextImprints = [...imprints, questionId];
        setCredits(nextCredits);
        setImprints(nextImprints);
        updateProfile({ credits: nextCredits, imprints: nextImprints });
        alert(`✨ Confirmed! This truth belongs to you.`);
      };

      const triggerOverwrite = (questionId, currentOwner) => {
        const nextCredits = credits - 60;
        setCredits(nextCredits);
        updateProfile({ credits: nextCredits });
        alert(`🔥 Overwritten! You captured the seal of ${currentOwner}.`);
      };

      const submitNewQuestion = (qData) => {
        setQuestionsDB([...questionsDB, qData]);
        alert(t.sealedOfRa);
        setView('hub');
      };

      const handleReset = () => {
        localStorage.removeItem("duat_profile");
        setProfile(null);
        setView('onboarding');
      };

      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-black">
          <p className="text-amber-500 text-xl tracking-widest flame-animate">{t.loading}</p>
        </div>
      );

      if (view === 'onboarding') return <OnboardingScreen onSelectForce={handleSelectForce} />;
      if (view === 'hub')        return (
        <HubScreen profile={profile} credits={credits} streak={streak} imprints={imprints}
          factionWar={factionWar} leaderboard={leaderboard}
          onStartRound={startNewRound}
          onViewSubmit={() => setView('submit')} onViewScroll={() => setView('scroll')}
          simulateAbsence={simulateAbsence} setSimulateAbsence={setSimulateAbsence}
          onReset={handleReset} />
      );
      if (view === 'play') return (
        <PlayScreen round={currentRound} roundIndex={roundIndex} setRoundIndex={setRoundIndex}
          selectedForce={profile?.force} credits={credits} setCredits={setCredits}
          profile={profile} updateProfile={updateProfile}
          onFinish={() => setView('hub')}
          consecrate={consecrate} triggerOverwrite={triggerOverwrite}
          stabilityFeePercent={factionWar.stabilityFee} />
      );
      if (view === 'submit') return <SubmitScreen onSubmit={submitNewQuestion} onBack={() => setView('hub')} />;
      if (view === 'scroll') return <ScrollScreen leaderboard={leaderboard} onBack={() => setView('hub')} />;
      return null;
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
