<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Cairo', 'Cinzel', serif; }
    body { background: #050202; overflow-x: hidden; }
    .flame-glow { animation: flameAnimation 1.5s infinite alternate; }
    @keyframes flameAnimation {
      0% { text-shadow: 0 0 5px #d97706, 0 0 12px #b45309; opacity: 0.85; }
      100% { text-shadow: 0 0 25px #f59e0b, 0 0 35px #d97706; opacity: 1; }
    }
    .cinematic-fade { animation: cinematicEntrance 3.5s ease-out forwards; opacity: 0; }
    @keyframes cinematicEntrance {
      0% { opacity: 0; transform: scale(0.95); filter: blur(15px); }
      25% { opacity: 1; filter: blur(0px); }
      75% { opacity: 1; transform: scale(1); filter: blur(0px); }
      100% { opacity: 0; transform: scale(1.02) translateY(-5px); filter: blur(5px); }
    }
    .cobweb-overlay::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, rgba(146,64,14,0.12) 0px, rgba(146,64,14,0.12) 2px, transparent 2px, transparent 10px);
      pointer-events: none; z-index: 10;
    }
    .shake-critical { animation: shakeAction 0.25s infinite alternate; }
    @keyframes shakeAction {
      0% { transform: translateX(-2px); } 100% { transform: translateX(2px); border-color: #ef4444; }
    }
    .progress-smooth { transition: width 0.15s linear; }
  </style>
</head>

    // ------------------- 1. العرض السينمائي (Cinematic Intro) -------------------
    const CinematicIntro = ({ onComplete }) => {

    // ------------------- 3. لوحة التحكم الكبرى والكاملة (The Hub Dashboard) -------------------
    const HubDashboard = ({ profile, factionStats, leaderboard, onStartRound, onViewSubmit, onViewLeaderboard, toggleAbsence, isAbsent, onReset }) => {

            </div>

              {/* شعلة رع التفاعلية */}

                {isAbsent && <p className="text-red-400/90 text-[11px] mt-2 bg-red-950/20 p-2 rounded border border-red-900/30">ظن الكهنة العظام أنك هلكت في الصحراء فتلاشت شعلتك وتكبدت رسوماً!</p>}
              </div>

              {/* رصيد الائتمانات والامتلاك */}
              <div className="bg-gradient-to-b from-stone-900/90 to-black p-5 rounded-2xl border border-stone-800 shadow-xl">
                <div className="flex justify-between items-center border-b border-stone-800/60 pb-3 mb-3">

              {/* ميزان الاستقرار وحرب الفصائل الفعال */}

                <div className="text-xs text-stone-400 font-bold mb-2">لفافة استقرار الفصائل الكبرى</div>
                <div className="w-full bg-stone-950 h-3 border border-stone-800 rounded-full overflow-hidden my-3">
                  <div className="bg-gradient-to-r from-amber-600 to-yellow-400 h-full transition-all duration-500" style={{ width: `${raPercentage}%` }} />

                <div className="flex justify-between text-[10px] text-stone-400 font-mono">

                  <span>ميزان أنوبيس ({Math.round(100 - raPercentage)}%)</span>
                </div>
                <div className="mt-3 pt-2 border-t border-stone-800/40 flex justify-between text-xs text-stone-400">
                  <span>ضريبة الاستقرار المالي: <span className="text-amber-500 font-bold">{factionStats.stabilityFee}%</span></span>
                  <span className="text-emerald-400 font-bold uppercase tracking-wider bg-emerald-950/30 px-1.5 py-0.5 rounded border border-emerald-900/40">{factionStats.mode === 'safe' ? "نمط آمن" : "خطر عالٍ"}</span>

            </div>

            {/* لوحة إطلاق الاختبارات الحقيقية */}
            <div className="bg-gradient-to-l from-amber-950/20 via-stone-900/60 to-stone-950 p-6 rounded-2xl border border-amber-900/30 flex flex-col md:flex-row justify-between items-center gap-6 mb-6">
              <div className="text-center md:text-right">
                <h3 className="text-xl font-bold text-amber-200 mb-1">ابدأ التحديات اللانهائية ونقش اسمك</h3>
                <p className="text-xs text-stone-400">ادخل البوابة لمواجهة سيل من الأسئلة المتنوعة؛ الإجابات الصحيحة تمنحك ائتمانات وتفتح لك حق التكريس الملكي للأسئلة.</p>
              </div>

        </div>

    // ------------------- 4. واجهة اللعب اللانهائي التفاعلي (Endless Gameplay View) -------------------
    const PlayEngineView = ({ round, onFinish, profile, setProfile, onConsecrate, onOverwrite, stabilityFee }) => {
      const [currentIdx, setCurrentIdx] = useState(0);
      const [timeLeft, setTimeLeft] = useState(profile.force === 'ra' ? 18 : 15);
      const [answered, setAnswered] = useState(false);
      const [chosenIdx, setChosenIdx] = useState(null);
      const [isAnubisTriggered, setIsAnubisTriggered] = useState(false);
      const timerRef = useRef(null);

      const q = round[currentIdx];

      useEffect(() => {
        setTimeLeft(profile.force === 'ra' ? 18 : 15);
        setAnswered(false);
        setChosenIdx(null);
        setIsAnubisTriggered(false);
      }, [currentIdx, profile.force]);

      useEffect(() => {
        if (answered) return;
        timerRef.current = setInterval(() => {
          setTimeLeft(p => {
            if (p <= 1) {
              clearInterval(timerRef.current);
              evaluateAnswer(-1);
              return 0;
            }
            return p - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [answered, currentIdx]);

      const evaluateAnswer = (index) => {
        if (answered) return;
        setAnswered(true);
        setChosenIdx(index);
        clearInterval(timerRef.current);

        const isCorrect = index === q.correct;
        let pointsEarned = isCorrect ? 20 : -5;
        
        // حساب مضاعفات الاستقرار
        if (isCorrect && stabilityFee > 5) pointsEarned = Math.floor(pointsEarned * 1.25);
        
        let finalCredits = Math.max(0, profile.credits + pointsEarned);
        let finalScore = profile.total_score + (isCorrect ? 15 : 0);

        const updated = { ...profile, credits: finalCredits, total_score: finalScore };
        setProfile(updated);
        localStorage.setItem("duat_profile_v2", JSON.stringify(updated));

        // فتح نظام التأكيد للتكريس/الامتلاك الحقيقي عند الإجابة الصحيحة
        setTimeout(() => {
          if (isCorrect) {
            if (q.owner && q.owner !== profile.display_name) {
              if (finalCredits >= 60 && window.confirm(`هذا السؤال يمتلكه الكاتب (${q.owner}). هل تريد استبداله وكسر الختم مقابل 60 ائتمان؟`)) {
                onOverwrite(q.id);
              }
            } else if (!q.owner) {
              if (finalCredits >= 30 && window.confirm(`السؤال حر! هل تريد تكريسه وامتلاكه باسمك مقابل 30 ائتمان؟`)) {
                onConsecrate(q.id);
              }
            }
          }

          if (currentIdx + 1 < round.length) {
            setCurrentIdx(prev => prev + 1);
          } else {
            onFinish();
          }
        }, 1500);
      };

      if (!q) return null;

      return (
        <div className="min-h-screen p-4 flex items-center justify-center bg-[#070505]">
          <div className={`max-w-xl w-full bg-stone-900 border border-stone-800 rounded-2xl overflow-hidden shadow-2xl transition-all ${timeLeft <= 5 ? 'shake-critical' : ''}`}>
            
            {/* شريط حالة السؤال الحركي */}
            <div className="bg-stone-950 p-4 flex justify-between items-center text-xs border-b border-stone-800/80">
              <span className="text-stone-400 font-bold">التحدي {currentIdx + 1} من {round.length}</span>
              {q.owner && <span className="bg-red-950/60 text-red-400 border border-red-900/40 px-2 py-0.5 rounded">📜 مملوك لـ: {q.owner}</span>}
              <span className={`font-mono font-black ${timeLeft <= 5 ? 'text-red-500 flame-glow' : 'text-amber-500'}`}>⏱️ العداد: {timeLeft}s</span>
            </div>

            <div className="w-full h-1.5 bg-stone-950">
              <div className="h-full bg-gradient-to-r from-amber-600 to-yellow-400 progress-smooth" style={{ width: `${(timeLeft / (profile.force === 'ra' ? 18 : 15)) * 100}%` }} />
            </div>

            {/* الصورة الحية المتغيرة الحقيقية المتصلة بالسؤال */}
            <div className="w-full h-44 relative bg-black">
              <img src={q.img} alt="Context Map" className="w-full h-full object-cover opacity-80" />
              <div className="absolute inset-0 bg-gradient-to-t from-stone-900 via-transparent to-transparent" />
            </div>

            <div className="p-6">
              <h2 className="text-lg font-bold text-amber-100 mb-6 leading-relaxed text-right">{q.text}</h2>

              {/* أزرار الإجابات التفاعلية بالكامل */}
              <div className="grid grid-cols-1 gap-2.5">
                {q.options.map((opt, i) => {
                  if (profile.force === 'anubis' && isAnubisTriggered && i !== q.correct && i % 2 === 0) return null;

                  let btnStyle = "bg-black/40 border-stone-800 text-stone-300 hover:border-amber-600 hover:bg-amber-950/20";
                  if (answered) {
                    if (i === q.correct) btnStyle = "bg-green-950/80 border-green-500 text-green-300 font-bold";
                    else if (i === chosenIdx) btnStyle = "bg-rose-950/80 border-rose-500 text-rose-300";
                    else btnStyle = "opacity-20 bg-stone-950 border-stone-900 text-stone-600";
                  }

                  return (
                    <button key={i} disabled={answered} onClick={() => evaluateAnswer(i)}
                            className={`w-full p-3.5 rounded-xl text-right text-sm border transition-all ${btnStyle}`}>
                      {opt}
                    </button>
                  );
                })}
              </div>

              {/* تفعيل خاصية أنوبيس الحقيقية */}
              {profile.force === 'anubis' && !isAnubisTriggered && !answered && (
                <button onClick={() => setIsAnubisTriggered(true)} className="mt-4 text-xs bg-amber-950/60 border border-amber-800 text-amber-400 px-3 py-1.5 rounded-lg hover:bg-amber-900">
                  ⚖️ تفعيل ميزان أنوبيس (حذف خيارات خاطئة)
                </button>
              )}

              <div className="mt-6 p-3 bg-black/60 rounded-xl border-r-4 border-amber-600 text-xs text-stone-400">
                <span className="text-amber-500 font-bold ml-1">𓋹 همسة المعبد الحرة:</span> {q.hint}
              </div>
            </div>

          </div>
        </div>
      );
    };

    // ------------------- 5. شاشة صياغة ونقش سؤال جديد (Submit View) -------------------
    const SubmitQuestionView = ({ onBack, onSave }) => {
      const [text, setText] = useState("");
      const [choices, setChoices] = useState(["", "", "", ""]);
      const [correct, setCorrect] = useState(0);

      const handlePublish = () => {
        if (!text || choices.some(c => !c.trim())) { alert("برجاء إدخال نص السؤال وجميع الاختيارات الأربعة كحقول كاملة!"); return; }
        onSave({
          id: `user_${Date.now()}`, text, options: choices, correct: parseInt(correct),
          category: "user_contributed", hint: "سؤال موثق من كتبة الأقاليم الحرة.",
          img: "https://images.unsplash.com/photo-1532187863486-abf9d39d6618?q=80&w=600", owner: null
        });
        alert("تم إرسال ونقش سؤالك بنجاح في سجلات رع الكبرى وتم إدراجه فوراً في اللعبة!");
        onBack();
      };

      return (
        <div className="min-h-screen p-4 flex items-center justify-center bg-[#090606]">
          <div className="max-w-xl w-full bg-stone-900 p-6 rounded-2xl border border-amber-900/30 shadow-2xl text-right">
            <h2 className="text-xl font-bold text-amber-400 border-b border-stone-800 pb-2 mb-4">نقش وتوثيق سؤال جديد في لفائف المعبد</h2>
            
            <label className="text-xs text-stone-400 block mb-1">نص ومضمون السؤال الكلي:</label>
            <textarea className="w-full p-3 bg-black border border-stone-800 text-amber-100 rounded-xl text-sm mb-4 focus:outline-none focus:border-amber-600" rows="3" placeholder="اكتب سؤالك هنا بكل وضوح..." value={text} onChange={e => setText(e.target.value)} />

            <label className="text-xs text-stone-400 block mb-1">الخيارات الأربعة البديلة:</label>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4">
              {choices.map((c, i) => (
                <input key={i} type="text" placeholder={`خيار إجابة رقم ${i+1}`} value={c} className="p-3 bg-black border border-stone-800 text-sm rounded-xl text-stone-200 focus:outline-none focus:border-amber-600"
                       onChange={e => { const cp = [...choices]; cp[i] = e.target.value; setChoices(cp); }} />
              ))}
            </div>

            <div className="mb-6 flex justify-between items-center bg-black/40 p-3 rounded-xl border border-stone-800">
              <span className="text-xs text-stone-400">تحديد دليل الإجابة الصحيحة:</span>
              <select className="bg-stone-950 text-amber-400 p-2 rounded-lg border border-stone-800 text-xs focus:outline-none" value={correct} onChange={e => setCorrect(e.target.value)}>
                <option value={0}>الخيار الأول هو الخيار الصحيح</option>
                <option value={1}>الخيار الثاني هو الخيار الصحيح</option>
                <option value={2}>الخيار الثالث هو الخيار الصحيح</option>
                <option value={3}>الخيار الرابع هو الخيار الصحيح</option>
              </select>
            </div>

            <div className="flex gap-2">
              <button onClick={handlePublish} className="bg-amber-600 hover:bg-amber-500 text-black font-black px-6 py-3 rounded-xl text-xs transition-all">توثيق ونشر السؤال</button>
              <button onClick={onBack} className="bg-stone-800 text-stone-400 px-4 py-3 rounded-xl text-xs hover:bg-stone-700">إلغاء والعودة للوحة</button>
            </div>
          </div>
        </div>
      );
    };

    // ------------------- 6. شاشة سجل الخالدين الكامل (Leaderboard View) -------------------
    const FullLeaderboardView = ({ onBack, list }) => (
      <div className="min-h-screen p-4 flex items-center justify-center bg-[#090606]">
        <div className="max-w-xl w-full bg-stone-900 p-6 rounded-2xl border border-amber-900/30 shadow-2xl text-right">
          <h2 className="text-2xl font-black text-amber-400 border-b border-stone-800 pb-3 mb-4">سجل كتبة المعبد الخالدين 🏆</h2>
          <div className="divide-y divide-stone-950 mb-6">
            {list.map((player, idx) => (
              <div key={idx} className="py-3.5 flex justify-between items-center text-sm border-b border-stone-900/40">
                <span className="text-stone-200 font-medium">
                  <span className="text-xs text-stone-600 font-mono ml-2">[{idx+1}]</span> {player.display_name}
                </span>
                <span className="font-mono font-bold text-amber-500 bg-black/40 px-3 py-1 rounded-lg border border-stone-950">{player.total_score} نقطة مجد</span>
              </div>
            ))}
          </div>
          <button onClick={onBack} className="w-full bg-stone-800 text-stone-400 hover:text-white py-3 rounded-xl text-xs font-bold transition-all">العودة للوحة التحكم الرئيسية</button>
        </div>
      </div>
    );

    // ------------------- 7. النواة والمتحكم الأساسي الفعال (The Core Application) -------------------
    const MasterSanctuaryApp = () => {
      const [view, setView] = useState('intro'); 
      const [profile, setProfile] = useState(null);
      const [questionsDB, setQuestionsDB] = useState(MASTER_QUESTIONS_DB);
      const [activeRoundPool, setActiveRoundPool] = useState([]);
      const [isAbsent, setIsAbsent] = useState(false);

      const [factionStats, setFactionStats] = useState({ raScore: 180, anubisScore: 160, stabilityFee: 4, mode: 'safe' });

      useEffect(() => {
        const savedData = localStorage.getItem("duat_profile_v3");
        if (savedData) {
          const parsed = JSON.parse(savedData);
          setProfile(parsed);
        }
      }, []);

      const handleIntroEnd = useCallback(() => {
        setView(profile ? 'hub' : 'onboarding');
      }, [profile]);

      const handleRegistration = (forceId, name) => {
        const newProfile = { display_name: name, force: forceId, credits: 120, total_score: 0, streak: 3, imprints: [] };
        setProfile(newProfile);
        localStorage.setItem("duat_profile_v3", JSON.stringify(newProfile));
        setView('hub');
      };

      const startRound = () => {
        // إنشاء جولة عشوائية ممتدة من بنك الأسئلة دون سقف عشوائي ضيق لقفل اللعب اللانهائي
        const scrambled = [...questionsDB].sort(() => 0.5 - Math.random());
        setActiveRoundPool(scrambled.slice(0, 5));
        setView('play');
      };

      const executeConsecrate = (questionId) => {
        if (!profile) return;
        const nextCredits = Math.max(0, profile.credits - 30);
        const nextImprints = [...(profile.imprints || []), questionId];
        
        // تحديث قواعد البيانات والسيرفر المحلي
        const updatedDB = questionsDB.map(q => q.id === questionId ? { ...q, owner: profile.display_name } : q);
        setQuestionsDB(updatedDB);

        const updatedProfile = { ...profile, credits: nextCredits, imprints: nextImprints };
        setProfile(updatedProfile);
        localStorage.setItem("duat_profile_v3", JSON.stringify(updatedProfile));

        // زيادة قوة الفصيل الحركي
        setFactionStats(prev => ({ ...prev, raScore: prev.raScore + 20, stabilityFee: 6, mode: 'high_risk' }));
        alert("✨ تم التكريس! هذا السؤال يحمل ختك الملكي الآن في سجلات الدوات.");
      };

      const executeOverwrite = (questionId) => {
        if (!profile) return;
        const nextCredits = Math.max(0, profile.credits - 60);
        
        const updatedDB = questionsDB.map(q => q.id === questionId ? { ...q, owner: profile.display_name } : q);
        setQuestionsDB(updatedDB);

        const updatedProfile = { ...profile, credits: nextCredits };
        setProfile(updatedProfile);
        localStorage.setItem("duat_profile_v3", JSON.stringify(updatedProfile));

        alert("🔥 كسر الختم! قمت بالإطاحة بمالك السؤال القديم وفرضت سيطرتك.");
      };

      const toggleAbsenceSimulation = () => {
        if (!profile) return;
        if (!isAbsent) {
          // عقوبة خصم الائتمان الحقيقية عند محاكاة الغياب لـ 7 أيام
          const penalizedCredits = Math.max(0, profile.credits - 40);
          const updated = { ...profile, credits: penalizedCredits, streak: 0 };
          setProfile(updated);
          setIsAbsent(true);
        } else {
          setProfile(p => ({ ...p, streak: 3 }));
          setIsAbsent(false);
        }
      };

      const handleReset = () => {
        localStorage.removeItem("duat_profile_v3");
        setProfile(null);
        setIsAbsent(false);
        setView('onboarding');
      };

      const handleAddCustomQuestion = (newQuestionObj) => {
        setQuestionsDB(prev => [newQuestionObj, ...prev]);
      };

      const globalLeaderboard = useMemo(() => {
        return [
          { display_name: "كبير الكهنة آمنحوتب", total_score: 310 },
          { display_name: "الكاتبة الملكية نفرتاري", total_score: 240 },
          { display_name: profile?.display_name || "أنت", total_score: profile?.total_score || 0 },
          { display_name: "حارس السجلات_Thoth", total_score: 140 }
        ].sort((a, b) => b.total_score - a.total_score);
      }, [profile?.total_score, profile?.display_name]);

      if (view === 'intro')       return <CinematicIntro onComplete={handleIntroEnd} />;
      if (view === 'onboarding')  return <OnboardingScreen onRegister={handleRegistration} />;
      
      if (view === 'hub') return (
        <HubDashboard profile={profile} factionStats={factionStats} leaderboard={globalLeaderboard}
          onStartRound={startRound} onViewSubmit={() => setView('submit')} onViewLeaderboard={() => setView('leaderboard')}
          toggleAbsence={toggleAbsenceSimulation} isAbsent={isAbsent} onReset={handleReset} />
      );

      if (view === 'play') return (
        <PlayEngineView round={activeRoundPool} profile={profile} setProfile={setProfile}
          onConsecrate={executeConsecrate} onOverwrite={executeOverwrite}
          stabilityFee={factionStats.stabilityFee} onFinish={() => setView('hub')} />
      );

      if (view === 'submit') return <SubmitQuestionView onBack={() => setView('hub')} onSave={handleAddCustomQuestion} />;
      if (view === 'leaderboard') return <FullLeaderboardView onBack={() => setView('hub')} list={globalLeaderboard} />;

      return null;
    };

    ReactDOM.createRoot(document.getElementById("sanctuary-root")).render(<MasterSanctuaryApp />);
  </script>
</body>
</html>
