    // -------------------- PLAY SCREEN (FIXED: no negative credits) --------------------
    const PlayScreen = ({ round, roundIndex, setRoundIndex, selectedForce, credits, setCredits, profile, updateProfile, onFinish, consecrate, triggerOverwrite, stabilityFeePercent }) => {
      const q = round[roundIndex];
      const startTime = selectedForce === 'ra' ? 18 : 15;
      const [timeLeft, setTimeLeft] = useState(startTime);
      const [answered, setAnswered] = useState(false);
      const [shake, setShake]       = useState(false);
      const [usedAnubis, setUsedAnubis] = useState(false);
      const [hiddenWrong, setHiddenWrong] = useState(false);
      const [qOwner, setQOwner]     = useState(null);
      const timerRef = useRef(null);

      // Reset when question changes
      useEffect(() => {
        setTimeLeft(startTime);
        setAnswered(false);
        setHiddenWrong(false);
        setQOwner(null);
        setShake(false);
      }, [roundIndex]);

      // Fetch owner
      useEffect(() => {
        if (!q?.id || !supabase) return;
        supabase.from('imprints').select('player_name').eq('question_id', q.id).maybeSingle()
          .then(({ data }) => { if (data) setQOwner(data.player_name); });
      }, [q?.id]);

      // Timer
      useEffect(() => {
        if (answered) return;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(prev => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              return 0;
            }
            if (prev <= 5) setShake(true);
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [answered, roundIndex]);

      // Timeout trigger
      useEffect(() => {
        if (timeLeft === 0 && !answered) handleAnswer(-1);
      }, [timeLeft]);

      const handleAnswer = useCallback((chosenIdx) => {
        if (answered) return;
        setAnswered(true);
        clearInterval(timerRef.current);
        setShake(false);

        const isRight = chosenIdx === q.correct;
        let reward = isRight ? 10 : -5;
        let speedBonus = isRight && timeLeft >= 12 ? 20 : 0;
        let totalDelta = reward + speedBonus;
        if (stabilityFeePercent > 5 && isRight) totalDelta = Math.floor(totalDelta * 1.2);
        let newCredits = credits + totalDelta;
        // FIX: prevent negative credits
        if (newCredits < 0) newCredits = 0;
        const newScore   = (profile.total_score || 0) + (isRight ? 10 : 0);
        updateProfile({ credits: newCredits, total_score: newScore });
        setCredits(newCredits);

        setTimeout(() => {
          if (isRight) {
            if (qOwner) {
              if (qOwner !== profile.display_name && newCredits >= 60) {
                if (window.confirm(`${t.curse} occupied by ${qOwner}?`)) triggerOverwrite(q.id, qOwner);
              }
            } else {
              const cost = stabilityFeePercent > 5 ? 40 : 30;
              if (newCredits >= cost && window.confirm(`${t.consecrate} (${cost} credits)?`)) consecrate(q.id, cost);
            }
          }
          if (roundIndex + 1 < round.length) setRoundIndex(prev => prev + 1);
          else onFinish();
        }, 1200);
      }, [answered, q, credits, timeLeft, qOwner, roundIndex, round.length]);

      const isHintLie = useMemo(() => Math.random() < 0.3, [q?.id]);
      const hintText  = q ? (q[`hint_${currentLang}`] || q.hint_en) : "";
      const displayHint = isHintLie ? (currentLang==='en' ? "Deception: maybe false" : "خداع: ربما كاذب") : hintText;
      const forceIcons  = { ra:"☀️ Solar Radiance", anubis:"⚰️ Scales of Truth", isis:"🪶 Shield of Wisdom", horus:"🦅 Eye of Vigilance" };

      if (!q) return null;
      const options = currentLang === 'en' ? q.options_en : q.options_ar;

      return (
        <div className={`min-h-screen p-4 flex items-center justify-center bg-cover bg-center relative ${shake ? 'shake' : ''}`}
             style={{ backgroundImage:"url('https://i.ibb.co/6Wv6XvYV/1000097152.png')" }}>

              <span className="text-amber-500">🛡️ {forceIcons[selectedForce] || "Ancient Force"}</span>
              {qOwner && <span className="text-red-400 bg-red-950/40 px-2 py-0.5 rounded border border-red-900/30">📜 Owner: {qOwner}</span>}
            </div>
            <div className="flex justify-between items-center text-xs tracking-widest font-bold text-stone-400 uppercase">
              <span>🔥 {t.timeFuse}</span>
              <span className={timeLeft <= 4 ? 'text-red-500 flame-animate' : ''}>{timeLeft}s</span>
            </div>
            <div className="w-full h-2 bg-stone-950 border border-stone-800/80 rounded-full mt-2 overflow-hidden shadow-inner">
              <div className="h-full bg-gradient-to-r from-amber-600 to-yellow-400 transition-all duration-1000 rounded-full"
                   style={{ width:`${(timeLeft/startTime)*100}%` }} />
            </div>
            <div className="text-xl md:text-2xl my-8 font-bold leading-relaxed text-amber-100 border-l-2 md:border-l-4 border-amber-500 pl-4">
              {currentLang==='en' ? q.text_en : q.text_ar}
            </div>
            <div className="grid grid-cols-1 gap-3 mt-6">
              {options
                .map((opt, idx) => ({opt, idx}))
                .filter(({idx}) => !(selectedForce==='anubis' && hiddenWrong && idx !== q.correct))
                .map(({opt, idx}) => (
                  <button key={idx} onClick={() => handleAnswer(idx)} disabled={answered}
                          className="bg-black/40 border border-stone-800/70 p-3.5 rounded-xl hover:bg-amber-950/40 hover:border-amber-600 disabled:opacity-60 text-left text-sm font-medium tracking-wide text-stone-300 hover:text-amber-200 transition-all duration-200">
                    {opt}
                  </button>
                ))
              }
            </div>
            {selectedForce==='anubis' && !usedAnubis && !hiddenWrong && (
              <button onClick={() => { setHiddenWrong(true); setUsedAnubis(true); }}
                      className="mt-4 text-xs tracking-wider uppercase font-bold text-amber-400 bg-amber-950/60 border border-amber-800/50 hover:border-amber-500 px-3 py-2 rounded-xl transition-colors">
                🔮 Hide 2 wrong (Scales of Truth)

            <div className="mt-6 p-3 bg-black/60 rounded-xl italic border-l-4 border-amber-600 text-xs md:text-sm tracking-wide text-stone-400">
              <span className="text-amber-500 not-italic font-black uppercase mr-1">𓋹 {t.hint}:</span> {displayHint}

      const [leaderboard,   setLeaderboard]   = useState([]);
      const [simulateAbsence, setSimulateAbsence] = useState(false);

      useEffect(() => {
        if (!supabase) { setLoading(false); return; }
        supabase.auth.getSession().then(({ data:{ session } }) => {
          setSession(session);
          if (session) loadProfile(session);
          else setLoading(false);
        });
        const { data: listener } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) loadProfile(session);
          else { setProfile(null); setView('auth'); setLoading(false); }
        });
        return () => listener?.subscription.unsubscribe();
      }, []);

      async function loadProfile(session) {
        if (!session || !supabase) return;
        const { data, error } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        if (data && !error) {
          // --- STREAK LOGIC ---
          let newStreak = data.streak || 1;
          let newLastLogin = data.last_login;
          const today = new Date().toISOString().split('T')[0];
          const lastLoginDate = data.last_login ? new Date(data.last_login).toISOString().split('T')[0] : null;
          if (lastLoginDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            if (lastLoginDate === yesterdayStr) {
              newStreak = (data.streak || 1) + 1;
            } else {
              newStreak = 1;
            }
            newLastLogin = new Date().toISOString();
            await supabase.from('profiles').update({ streak: newStreak, last_login: newLastLogin }).eq('id', session.user.id);
          }
          // ---------------------
          const updatedData = { ...data, streak: newStreak, last_login: newLastLogin };
          setProfile(updatedData);
          setSelectedForce(updatedData.force);
          setCredits(updatedData.credits ?? 100);
          setStreak(newStreak);
          setImprints(updatedData.imprints || []);
          await loadQuestions();
          await loadLeaderboard();
          await loadFactionWar();
          setView(updatedData.force ? 'hub' : 'onboarding');
        } else {
          const newProfile = {
            id: session.user.id,
            display_name: session.user.user_metadata?.display_name || session.user.email?.split('@')[0] || 'Scribe',
            force: null, credits: 100, streak: 1, imprints: [], total_score: 0,
            last_login: new Date().toISOString(), last_submission_date: null, submission_count: 0
          };
          await supabase.from('profiles').insert(newProfile);
          setProfile(newProfile);
          setStreak(1);
          await loadQuestions();
          await loadLeaderboard();
          await loadFactionWar();
          setView('onboarding');
        }
        setLoading(false);
      }

      async function loadQuestions() {
        if (!supabase) { setQuestionsDB(FULL_SEED); return; }
        try {
          let { data, error } = await supabase.from('questions').select('*').eq('is_active', true).limit(300);
          if (error || !data || data.length < 10) {
            // Only seed once: check if any questions exist at all
            const { count } = await supabase.from('questions').select('*', { count: 'exact', head: true });
            if (count === 0) {
              for (const q of FULL_SEED) {
                await supabase.from('questions').upsert([q], { onConflict: 'id' });
              }
            }
            const { data: fresh } = await supabase.from('questions').select('*').eq('is_active', true);
            data = fresh || FULL_SEED;
          }
          setQuestionsDB(data && data.length ? data : FULL_SEED);
        } catch (err) {
          console.error("Failed to load questions:", err);
          setQuestionsDB(FULL_SEED);
        }
      }

      async function loadLeaderboard() {
        if (!supabase) return;
        const { data } = await supabase.from('profiles').select('display_name,total_score').order('total_score',{ ascending:false }).limit(10);
        setLeaderboard(data || []);
      }

      async function loadFactionWar() {
        if (!supabase) return;  // FIXED: added safety check
        await supabase.from('faction_scores').upsert(
          [{ faction:'ra', score:100 }, { faction:'anubis', score:80 }],
          { onConflict:'faction', ignoreDuplicates:true }
        );
        const { data: raData }    = await supabase.from('faction_scores').select('score').eq('faction','ra').maybeSingle();
        const { data: anubisData} = await supabase.from('faction_scores').select('score').eq('faction','anubis').maybeSingle();
        const ra     = raData?.score ?? 100;
        const anubis = anubisData?.score ?? 80;
        const mode   = ra >= anubis ? 'safe' : 'curse';
        setFactionWar({ ra, anubis, mode, stabilityFee: mode==='safe' ? 3 : 10 });
      }

      function startNewRound() {
        const db = questionsDB.length ? questionsDB : FULL_SEED;
        const shuffled = [...db].sort(() => 0.5 - Math.random());
        setCurrentRound(shuffled.slice(0, 3));
        setRoundIndex(0);
        setView('play');
      }

      async function updateProfile(changes) {
        if (!profile) return;
        if (supabase) {
          const { error } = await supabase.from('profiles').update(changes).eq('id', profile.id);
          if (!error) setProfile({...profile, ...changes});
        } else {
          setProfile({...profile, ...changes});
        }
        if (changes.credits !== undefined) setCredits(changes.credits);
        if (changes.streak !== undefined) setStreak(changes.streak);
      }

      async function updateFactionScore(forceId, points) {
        if (!supabase) return;
        const target = (forceId==='ra' || forceId==='horus') ? 'ra' : 'anubis';
        const { data } = await supabase.from('faction_scores').select('score').eq('faction', target).maybeSingle();
        if (data) {
          await supabase.from('faction_scores').update({ score: data.score + points }).eq('faction', target);
          await loadFactionWar();
        }
      }

      async function consecrate(questionId, cost) {
        if (credits < cost) { alert("Not enough credits"); return; }
        const newCredits     = credits - cost;
        const updatedImprints = [...imprints, questionId];
        await updateProfile({ credits: newCredits, imprints: updatedImprints });
        if (supabase) {
          await supabase.from('imprints').upsert(
            { question_id:questionId, player_name:profile.display_name, force:selectedForce, timestamp:new Date().toISOString() },
            { onConflict:'question_id' }
          );
        }
        setImprints(updatedImprints);
        await updateFactionScore(selectedForce, 15);
        alert(`✨ ${profile.display_name} claimed this truth! Faction score boosted.`);
      }

      async function triggerOverwrite(questionId, currentOwner) {
        if (credits < 60) { alert("Not enough credits to overwrite"); return; }
        const newCredits = credits - 60;
        await updateProfile({ credits: newCredits });
        if (supabase) {
          await supabase.from('imprints').upsert(
            { question_id:questionId, player_name:profile.display_name, force:selectedForce, timestamp:new Date().toISOString() },
            { onConflict:'question_id' }
          );
        }
        await updateFactionScore(selectedForce, 10);
        alert(`🔥 ${profile.display_name} has overwritten the truth of ${currentOwner}!`);
      }

      async function submitNewQuestion(questionData) {
        if (!profile) return;
        const today = new Date().toISOString().split('T')[0];
        let currentCount = profile.submission_count || 0;
        if (profile.last_submission_date !== today) {
          currentCount = 0;
          await updateProfile({ last_submission_date: today, submission_count: 0 });
        }
        if (currentCount >= 3) { alert(t.rateLimit); return; }
        const approved = Math.random() < 0.8;
        if (approved) {
          questionData.is_active   = true;
          questionData.votes_for   = 4;
          questionData.votes_against = 1;
          questionData.submitted_by  = profile.display_name;
          questionData.approved_at   = new Date().toISOString();
          if (supabase) await supabase.from('questions').insert([questionData]);
          await updateProfile({ submission_count: currentCount + 1 });
          alert(t.sealedOfRa);
          await loadQuestions();
        } else {
          alert(t.rejected);
        }
        setView('hub');
      }

      const handleSignIn  = (email, password)       => supabase.auth.signInWithPassword({ email, password });
      const handleSignUp  = (email, password, name) => supabase.auth.signUp({ email, password, options:{ data:{ display_name:name } } });
      const handleSignOut = async () => { if (supabase) await supabase.auth.signOut(); setView('auth'); };
      const selectForce   = async (force) => { setSelectedForce(force); await updateProfile({ force }); setView('hub'); };

      // ---- RENDER ----
      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-black">
          <p className="text-amber-400 text-xl tracking-widest flame-animate">{t.loading}</p>
        </div>
      );
      if (view === 'auth')       return <AuthScreen onSignIn={handleSignIn} onSignUp={handleSignUp} />;
      if (view === 'onboarding') return <OnboardingScreen onSelectForce={selectForce} />;
      if (view === 'hub')        return (
        <HubScreen profile={profile} credits={credits} streak={streak} imprints={imprints}
          factionWar={factionWar} leaderboard={leaderboard}
          onStartRound={startNewRound} onSignOut={handleSignOut}
          onViewSubmit={() => setView('submit')} onViewScroll={() => setView('scroll')}
          simulateAbsence={simulateAbsence} setSimulateAbsence={setSimulateAbsence} />
      );
      if (view === 'play') return (
        <PlayScreen round={currentRound} roundIndex={roundIndex} setRoundIndex={setRoundIndex}
          selectedForce={selectedForce} credits={credits} setCredits={setCredits}
          profile={profile} updateProfile={updateProfile}
          onFinish={() => { loadLeaderboard(); setView('hub'); }}
          consecrate={consecrate} triggerOverwrite={triggerOverwrite}
          stabilityFeePercent={factionWar.stabilityFee} />
      );
      if (view === 'submit') return <SubmitScreen onSubmit={submitNewQuestion} onBack={() => setView('hub')} />;
      if (view === 'scroll')  return <ScrollScreen leaderboard={leaderboard} onBack={() => setView('hub')} />;
      return null;
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
