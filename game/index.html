<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>بوابات الدوات · العودة للحياة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Cairo', 'Cinzel', serif; }
    body { 
      background: #050202; 
      overflow-x: hidden;
    }
    
    /* تأثير الشعلة الإلهية */
    .flame-gold {
      animation: flameGlow 1.5s infinite alternate;
    }
    @keyframes flameGlow {
      0% { text-shadow: 0 0 4px #d97706, 0 0 10px #b45309; opacity: 0.8; }
      100% { text-shadow: 0 0 20px #f59e0b, 0 0 30px #d97706; opacity: 1; }
    }

    /* أنيميشن المقدمة السينمائية */
    .cinematic-text {
      animation: dynamicEntrance 4s ease-out forwards;
      opacity: 0;
    }
    @keyframes dynamicEntrance {
      0% { opacity: 0; transform: scale(0.9) translateY(20px); filter: blur(10px); }
      30% { opacity: 1; filter: blur(0px); }
      70% { opacity: 1; transform: scale(1); filter: blur(0px); }
      100% { opacity: 0; transform: scale(1.05) translateY(-10px); filter: blur(5px); }
    }

    .fade-in-view {
      animation: fadeInView 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeInView {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* تأثير الاهتزاز عند قرب انتهاء الوقت */
    .time-shake { animation: lowTime 0.3s infinite alternate; }
    @keyframes lowTime {
      0% { transform: translateX(-2px) rotate(-0.5deg); }
      100% { transform: translateX(2px) rotate(0.5deg); border-color: #ef4444; }
    }
  </style>
</head>
<body class="text-gray-100 bg-[#050202] selection:bg-amber-800 selection:text-black">
  <div id="root"></div>

  <!-- React Framework -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // بنك أسئلة جديد تماماً ومتنوع (جغرافيا، علوم، تاريخ، ذكاء) لتجنب التكرار
    const NEW_QUESTIONS_POOL = [
      { id:"q1", text:"ما هو الكوكب الأقرب إلى الشمس في نظامنا الشمسي؟", options:["المريخ", "عطارد", "الزهرة", "المشتري"], correct:1, hint:"كوكب صغير جداً وليس لديه غلاف جوي سميك." },
      { id:"q2", text:"أي من المحيطات التالية يعتبر الأكبر مساحة على وجه الأرض؟", options:["المحيط الأطلسي", "المحيط الهندي", "المحيط الهادئ", "المحيط المتجمد الشمالي"], correct:2, hint:"يغطي ما يقرب من ثلث مساحة سطح الأرض." },
      { id:"q3", text:"ما هي العملة الرسمية المستخدمة في اليابان؟", options:["الين", "اليوان", "الووُن", "الدولار"], correct:0, hint:"يرمز له بالرمز ¥." },
      { id:"q4", text:"ما هي المادة الأشد صلابة في الطبيعة؟", options:["الحديد", "الألماس", "الجرانيت", "التيتانيوم"], correct:1, hint:"تتكون بالكامل من عنصر الكربون تحت ضغط شديد." },
      { id:"q5", text:"كم عدد صمامات قلب الإنسان البالغ؟", options:["صمامان", "3 صمامات", "4 صمامات", "5 صمامات"], correct:2, hint:"يتطابق عددها مع عدد حجرات القلب الأربعة." },
      { id:"q6", text:"في أي عام سقط جدار برلين الشهير؟", options:["1985", "1989", "1991", "1993"], correct:1, hint:"قبل عامين فقط من تفكك الاتحاد السوفيتي." }
    ];

    // ------------------- الشاشة السينمائية الأولى -------------------
    const CinematicIntro = ({ onIntroEnd }) => {
      useEffect(() => {
        const timer = setTimeout(() => onIntroEnd(), 3800);
        return () => clearTimeout(timer);
      }, []);

      return (
        <div className="min-h-screen bg-black flex flex-col items-center justify-center text-center p-6 relative overflow-hidden">
          <div className="absolute inset-0 bg-cover bg-center opacity-20" 
               style={{ backgroundImage: `url('https://images.unsplash.com/photo-1539650116574-8efeb43e2750?q=80&w=1200')` }} />
          <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black" />
          
          <div className="relative z-10 cinematic-text max-w-xl">
            <h1 className="text-4xl md:text-5xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-amber-100 via-amber-400 to-amber-700 font-serif mb-4">
              طُقُوسُ العَالَمِ السُّفْلِيِّ
            </h1>
            <p className="text-amber-600/80 tracking-widest text-xs uppercase font-serif mb-8">MDM1 Org Dynamic Experience</p>
            <div className="h-[1px] w-24 bg-amber-600 mx-auto my-4" />
            <p className="text-stone-400 text-sm md:text-base leading-relaxed font-light">
              "العدالة ميزان لا يخطئ، والكلمة المكتوبة لا تموت أبداً.. استعد لمواجهة قضاة الحقيقة."
            </p>
          </div>
        </div>
      );
    };

    // ------------------- شاشة اختيار اسم الكاتب والقوة -------------------
    const OnboardingScreen = ({ onSelectForce }) => {
      const [name, setName] = useState("");
      const forces = [
        { id:"ra", name:"اشعاع رع الشمسي", desc:"+3 ثوانٍ إضافية للمؤقت", icon:"☀️", color:"from-amber-600 to-yellow-500" },
        { id:"anubis", name:"ميزان أنوبيس", desc:"إخفاء خيارين خاطئين تلقائياً", icon:"⚖️", color:"from-stone-800 to-stone-950" },
        { id:"isis", name:"درع إيزيس السحري", desc:"حماية وإحياء عند أول إجابة خاطئة", icon:"🪶", color:"from-teal-700 to-cyan-900" }
      ];

      return (
        <div className="min-h-screen py-12 px-4 bg-cover bg-center relative flex flex-col justify-center items-center"
             style={{ backgroundImage: `url('https://images.unsplash.com/photo-1600577916048-804c9191e36c?q=80&w=1200')` }}>
          <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" />

          <div className="relative z-10 w-full max-w-xl bg-stone-900/80 p-6 rounded-2xl border border-amber-700/30 text-center shadow-2xl mb-8">
            <h2 className="text-amber-400 font-bold mb-3 text-lg tracking-wider">اكتب اسمك في سجل الخالدين</h2>
            <input 
              type="text" 
              className="w-full p-3 bg-black border border-amber-900 rounded-xl text-center text-amber-200 text-xl font-bold focus:outline-none focus:border-amber-500"
              placeholder="اسم الكاتب..."
              value={name}
              onChange={e => setName(e.target.value)}
            />
          </div>

          <h2 className="relative z-10 text-center text-xl md:text-2xl font-black text-amber-200 tracking-wide mb-6">اختر القوة التي تحميك داخل البوابة</h2>
          
          <div className="relative z-10 flex flex-wrap justify-center gap-4 max-w-4xl w-full">
            {forces.map(f => (
              <div key={f.id} onClick={() => onSelectForce(f.id, name.trim() || "كاتب مجهول")}
                   className="cursor-pointer w-full sm:w-64 bg-gradient-to-b from-stone-900 to-black p-5 rounded-xl border border-stone-800 hover:border-amber-500 shadow-xl transition-all duration-300 hover:-translate-y-1 text-center">
                <div className="text-4xl mb-3">{f.icon}</div>
                <div className="text-base font-bold text-amber-400 mb-1">{f.name}</div>
                <div className="text-xs text-stone-400 bg-stone-950/60 p-2 rounded-lg border border-stone-900">{f.desc}</div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ------------------- اللوحة الرئيسية (The Hub) -------------------
    const HubScreen = ({ profile, onStart, onViewLeaderboard, onViewSubmit, onReset }) => {
      return (
        <div className="min-h-screen bg-[#070404] text-right p-4 md:p-8 flex flex-col justify-between relative">
          <div className="absolute inset-0 bg-cover bg-center opacity-5" 
               style={{ backgroundImage: `url('https://images.unsplash.com/photo-1539650116574-8efeb43e2750?q=80&w=1200')` }} />
          
          <div className="max-w-5xl w-full mx-auto relative z-10">
            {/* الهيدر */}
            <div className="flex justify-between items-center border-b border-amber-900/30 pb-4 mb-8">
              <div>
                <h1 className="text-xl font-black text-amber-400">𓃀 {profile.display_name}</h1>
                <p className="text-xs text-stone-500">القوة المفعلة: <span className="text-amber-600 font-bold">{profile.force}</span></p>
              </div>
              <button onClick={onReset} className="text-xs bg-red-950/40 text-red-400 border border-red-900/50 px-3 py-1.5 rounded-lg hover:bg-red-900 hover:text-white transition-all">
                إعادة ضبط الحساب 🔄
              </button>
            </div>

            {/* بطاقات الإحصائيات الفعالة */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
              <div className="bg-stone-900/60 p-5 rounded-xl border border-stone-800">
                <div className="text-xs text-stone-400 mb-1">شُعلة رع (النشاط اليومي)</div>
                <div className="text-2xl font-bold text-amber-500 flame-gold">متوهجة 🔥 (3 أيام)</div>
              </div>
              <div className="bg-stone-900/60 p-5 rounded-xl border border-stone-800">
                <div className="text-xs text-stone-400 mb-1">الائتمانات الحالية (Credits)</div>
                <div className="text-2xl font-bold text-yellow-500">✨ {profile.credits} نقطة</div>
              </div>
              <div className="bg-stone-900/60 p-5 rounded-xl border border-stone-800">
                <div className="text-xs text-stone-400 mb-1">البصمات الخالدة في السجل</div>
                <div className="text-2xl font-bold text-cyan-500">𓋹 {profile.imprints?.length || 0} سؤال</div>
              </div>
            </div>

            {/* قسم التحكم الرئيسي الفعال */}
            <div className="bg-gradient-to-r from-amber-950/20 via-stone-900/60 to-transparent p-6 rounded-2xl border border-amber-900/40 text-center md:text-right flex flex-col md:flex-row justify-between items-center gap-6">
              <div>
                <h3 className="text-xl font-bold text-amber-200 mb-1">الاختبارات الكبرى جاهزة</h3>
                <p className="text-xs text-stone-400">أجب عن 3 أسئلة متنوعة لتخليد اسمك في السجل والحصول على الائتمانات.</p>
              </div>
              <button onClick={onStart} className="bg-gradient-to-l from-amber-600 to-amber-500 text-black font-black text-lg px-8 py-4 rounded-xl shadow-xl shadow-amber-950/50 hover:from-amber-500 hover:to-amber-400 transition-all transform hover:-translate-y-0.5">
                دخول بوابة الاختبارات 𓁹
              </button>
            </div>

            {/* الأزرار الفرعية الفعالة */}
            <div className="grid grid-cols-2 gap-4 mt-4">
              <button onClick={onViewSubmit} className="bg-stone-900/40 border border-stone-800 p-4 rounded-xl text-center hover:border-amber-700/50 text-stone-300 transition-all">
                ✍️ تقديم سؤال جديد للمجلس
              </button>
              <button onClick={onViewLeaderboard} className="bg-stone-900/40 border border-stone-800 p-4 rounded-xl text-center hover:border-amber-700/50 text-stone-300 transition-all">
                🏆 عرض لوحة المتصدرين الفعليين
              </button>
            </div>
          </div>

          <p className="text-center text-[10px] text-stone-600 max-w-xl mx-auto mt-12">
            تم استلهام الرموز من التراث التاريخي للموقع الأصلي. جميع الحقوق محفوظة لـ MDM1 Org 2026.
          </p>
        </div>
      );
    };

    // ------------------- شاشة اللعب الفعلي -------------------
    const PlayScreen = ({ round, onFinish, profile, setProfile }) => {
      const [idx, setIdx] = useState(0);
      const [timeLeft, setTimeLeft] = useState(profile.force === 'ra' ? 18 : 15);
      const [answered, setAnswered] = useState(false);
      const [chosen, setChosen] = useState(null);
      const timerRef = useRef(null);

      const currentQuestion = round[idx];

      useEffect(() => {
        setTimeLeft(profile.force === 'ra' ? 18 : 15);
        setAnswered(false);
        setChosen(null);
      }, [idx, profile.force]);

      useEffect(() => {
        if (answered) return;
        timerRef.current = setInterval(() => {
          setTimeLeft(p => {
            if (p <= 1) {
              clearInterval(timerRef.current);
              handleSelectAnswer(-1); // انتهاء الوقت يعامل كإجابة خاطئة
              return 0;
            }
            return p - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [answered, idx]);

      const handleSelectAnswer = (selectedIdx) => {
        if (answered) return;
        setAnswered(true);
        setChosen(selectedIdx);
        clearInterval(timerRef.current);

        const isCorrect = selectedIdx === currentQuestion.correct;
        let pointsDelta = isCorrect ? 15 : -5;
        let newCredits = Math.max(0, profile.credits + pointsDelta);
        let newScore = profile.total_score + (isCorrect ? 10 : 0);

        const updatedProfile = { ...profile, credits: newCredits, total_score: newScore };
        setProfile(updatedProfile);
        localStorage.setItem("duat_profile", JSON.stringify(updatedProfile));

        setTimeout(() => {
          if (idx + 1 < round.length) {
            setIdx(idx + 1);
          } else {
            onFinish();
          }
        }, 1500);
      };

      if (!currentQuestion) return null;

      return (
        <div className="min-h-screen p-4 flex items-center justify-center bg-[#070505]">
          <div className={`max-w-xl w-full bg-stone-900/90 p-6 md:p-8 rounded-2xl border border-stone-800 shadow-2xl transition-all ${timeLeft <= 5 ? 'time-shake' : ''}`}>
            
            <div className="flex justify-between items-center border-b border-stone-800 pb-3 mb-6">
              <span className="text-xs font-bold text-stone-400">السؤال {idx + 1} من {round.length}</span>
              <span className={`text-sm font-mono font-bold ${timeLeft <= 5 ? 'text-red-500 flame-gold' : 'text-amber-500'}`}>
                ⏳ الفتيل الزمني: {timeLeft} ثانية
              </span>
            </div>

            <h2 className="text-lg md:text-xl font-bold text-amber-100 mb-6 leading-relaxed">
              {currentQuestion.text}
            </h2>

            <div className="grid grid-cols-1 gap-3">
              {currentQuestion.options.map((opt, i) => {
                let btnStyle = "bg-black/40 border border-stone-800 text-stone-300 hover:border-amber-600 hover:bg-amber-950/20";
                if (answered) {
                  if (i === currentQuestion.correct) btnStyle = "bg-green-950/80 border-green-500 text-green-200 font-bold";
                  else if (i === chosen) btnStyle = "bg-red-950/80 border-red-500 text-red-200";
                  else btnStyle = "opacity-40 bg-black/20 border-stone-900 text-stone-500";
                }

                return (
                  <button key={i} disabled={answered} onClick={() => handleSelectAnswer(i)}
                          className={`w-full p-4 rounded-xl text-right text-sm transition-all duration-200 ${btnStyle}`}>
                    {opt}
                  </button>
                );
              })}
            </div>

            <div className="mt-6 p-3 bg-black/60 rounded-xl border-r-4 border-amber-600 text-xs text-stone-400 leading-relaxed">
              <span className="text-amber-500 font-bold ml-1">𓋹 همسة المعبد:</span> {currentQuestion.hint}
            </div>

          </div>
        </div>
      );
    };

    // ------------------- شاشة إضافة سؤال جديد الفعالة -------------------
    const SubmitScreen = ({ onBack, onAddQuestion }) => {
      const [text, setText] = useState("");
      const [opts, setOpts] = useState(["", "", "", ""]);
      const [correct, setCorrect] = useState(0);

      const handleSave = () => {
        if (!text || opts.some(o => !o)) { alert("برجاء ملء السؤال وجميع الاختيارات الأربعة!"); return; }
        onAddQuestion({
          id: `user_${Date.now()}`,
          text: text,
          options: opts,
          correct: parseInt(correct),
          hint: "سؤال مضاف بواسطة أحد كتبة المعبد."
        });
        alert("تم تسليم سؤالك بنجاح ومراجعته من مجلس رع! تم إدراجه في اللعبة.");
        onBack();
      };

      return (
        <div className="min-h-screen p-4 flex items-center justify-center bg-[#090606]">
          <div className="max-w-xl w-full bg-stone-900 p-6 rounded-2xl border border-amber-900/30 shadow-2xl fade-in-view">
            <h2 className="text-xl font-bold text-amber-400 border-b border-stone-800 pb-2 mb-4">نقش سؤال جديد في لفافة المصير</h2>
            
            <label className="text-xs text-stone-400 block mb-1">نص السؤال:</label>
            <textarea className="w-full p-3 bg-black border border-stone-800 text-amber-100 rounded-xl text-sm mb-4 focus:outline-none focus:border-amber-600"
                      rows="3" placeholder="اكتب سؤالك هنا..." value={text} onChange={e => setText(e.target.value)} />

            <label className="text-xs text-stone-400 block mb-1">الاختيارات الأربعة:</label>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 mb-4">
              {opts.map((o, i) => (
                <input key={i} type="text" placeholder={`خيار رقم ${i+1}`} value={o}
                       className="p-2.5 bg-black border border-stone-800 text-sm rounded-lg text-stone-300 focus:outline-none focus:border-amber-600"
                       onChange={e => {
                         const copy = [...opts];
                         copy[i] = e.target.value;
                         setOpts(copy);
                       }} />
              ))}
            </div>

            <div className="mb-6 flex justify-between items-center bg-black/40 p-3 rounded-xl border border-stone-800">
              <span className="text-xs text-stone-400">مؤشر الإجابة الصحيحة:</span>
              <select className="bg-stone-900 text-amber-400 p-1.5 rounded border border-stone-700 text-xs"
                      value={correct} onChange={e => setCorrect(e.target.value)}>
                <option value={0}>الخيار الأول هو الصحيح</option>
                <option value={1}>الخيار الثاني هو الصحيح</option>
                <option value={2}>الخيار الثالث هو الصحيح</option>
                <option value={3}>الخيار الرابع هو الصحيح</option>
              </select>
            </div>

            <div className="flex gap-2">
              <button onClick={handleSave} className="bg-amber-600 text-black font-bold px-6 py-2.5 rounded-xl text-xs hover:bg-amber-500 transition-all">حفظ ونقش السؤال</button>
              <button onClick={onBack} className="bg-stone-800 text-stone-400 px-4 py-2.5 rounded-xl text-xs hover:bg-stone-700">رجوع للقاعة</button>
            </div>
          </div>
        </div>
      );
    };

    // ------------------- شاشة لوحة الصدارة الفعالة -------------------
    const LeaderboardScreen = ({ onBack, list }) => (
      <div className="min-h-screen p-4 flex items-center justify-center bg-[#090606]">
        <div className="max-w-md w-full bg-stone-900 p-6 rounded-2xl border border-amber-900/30 shadow-2xl text-right fade-in-view">
          <h2 className="text-xl font-bold text-amber-400 border-b border-stone-800 pb-2 mb-4">سجل الكتبة الأبديين 🏆</h2>
          <div className="divide-y divide-stone-800">
            {list.map((p, idx) => (
              <div key={idx} className="py-3 flex justify-between items-center text-sm">
                <span className="text-stone-300 font-medium">
                  <span className="text-xs text-stone-600 font-mono ml-2">#{idx+1}</span> {p.display_name}
                </span>
                <span className="font-mono font-bold text-amber-500">{p.total_score} نقطة مجد</span>
              </div>
            ))}
          </div>
          <button onClick={onBack} className="w-full mt-6 bg-stone-800 text-stone-400 py-3 rounded-xl text-xs font-bold hover:bg-stone-700 transition-all">
            العودة للرئيسية
          </button>
        </div>
      </div>
    );

    // ------------------- التطبيق والمتحكم الفعلي -------------------
    const MainApp = () => {
      const [view, setView] = useState('intro'); // شاشة البداية السينمائية أولاً
      const [profile, setProfile] = useState(null);
      const [questionsDB, setQuestionsDB] = useState(NEW_QUESTIONS_POOL);
      const [activeRound, setActiveRound] = useState([]);

      useEffect(() => {
        const localData = localStorage.getItem("duat_profile_v2");
        if (localData) {
          setProfile(JSON.parse(localData));
        }
      }, []);

      const handleIntroEnd = () => {
        setView(profile ? 'hub' : 'onboarding');
      };

      const handleSelectForce = (forceId, scribeName) => {
        const initProfile = { display_name: scribeName, force: forceId, credits: 100, total_score: 0, imprints: [] };
        setProfile(initProfile);
        localStorage.setItem("duat_profile_v2", JSON.stringify(initProfile));
        setView('hub');
      };

      const startRound = () => {
        const shuffled = [...questionsDB].sort(() => 0.5 - Math.random());
        setActiveRound(shuffled.slice(0, 3));
        setView('play');
      };

      const handleReset = () => {
        localStorage.removeItem("duat_profile_v2");
        setProfile(null);
        setView('onboarding');
      };

      const addNewQuestion = (newQ) => {
        setQuestionsDB([newQ, ...questionsDB]);
      };

      const mockLeaderboard = [
        { display_name: "كبير الكهنة آمنحوتب", total_score: 250 },
        { display_name: "الكاتبة نفرتاري", total_score: 190 },
        { display_name: profile?.display_name || "أنت", total_score: profile?.total_score || 0 },
        { display_name: "حكيم المعبد", total_score: 110 }
      ].sort((a,b) => b.total_score - a.total_score);

      if (view === 'intro') return <CinematicIntro onIntroEnd={handleIntroEnd} />;
      if (view === 'onboarding') return <OnboardingScreen onSelectForce={handleSelectForce} />;
      if (view === 'hub') return <HubScreen profile={profile} onStart={startRound} onReset={handleReset} onViewLeaderboard={() => setView('leaderboard')} onViewSubmit={() => setView('submit')} />;
      if (view === 'play') return <PlayScreen round={activeRound} profile={profile} setProfile={setProfile} onFinish={() => setView('hub')} />;
      if (view === 'submit') return <SubmitScreen onBack={() => setView('hub')} onAddQuestion={addNewQuestion} />;
      if (view === 'leaderboard') return <LeaderboardScreen onBack={() => setView('hub')} list={mockLeaderboard} />;
      return null;
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<MainApp />);
  </script>
</body>
</html>
